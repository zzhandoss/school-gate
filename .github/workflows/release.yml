name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.20.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Package release artifacts
        run: bash .github/scripts/build-release-artifacts.sh
        env:
          GIT_TAG: ${{ github.ref_name }}
          GIT_SHA: ${{ github.sha }}

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.zip
            release/SHA256SUMS
          generate_release_notes: true
